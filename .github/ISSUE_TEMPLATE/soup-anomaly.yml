name: "SOUP anomaly"
description: "Record + evaluate a published anomaly of a SOUP component (IEC 62304 §7.1.3). See docs/SOUP.md."
title: "[SOUP] <component>: <anomaly id / one line>"
labels: ["soup-anomaly"]
body:
  - type: markdown
    attributes:
      value: |
        One anomaly per issue. This is the **§7.1.3 evaluation record**; mirror the
        result into the component's `anomalies:` block in `soup.yaml`. Security CVEs on
        SOUP components may also arrive automatically via the risk-automation feed.
  - type: input
    id: component
    attributes:
      label: SOUP component (name@version)
      placeholder: "example-fhir-client@4.11.0 — as inventoried in soup.yaml"
    validations:
      required: true
  - type: input
    id: anomaly-ref
    attributes:
      label: Anomaly reference
      description: "CVE id, upstream bug/issue URL, errata entry."
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "What is wrong, in one or two lines."
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact assessment vs the relied-upon functions (§7.1.3)
      description: "Does the anomaly affect the functional/performance requirements this product relies on (soup.yaml `requirements:`)? 'Assessment pending — needs analysis' is a valid answer."
    validations:
      required: true
  - type: dropdown
    id: safety
    attributes:
      label: Can it contribute to a hazardous situation?
      description: "If yes or unclear: raise a linked harm-risk issue (docs/HARM_RISK.md) — this record does not replace it."
      options:
        - "no"
        - "unclear — analysis needed"
        - "yes — harm-risk issue raised (link below)"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - open
        - mitigated (state how below)
        - not-affected (state why below)
    validations:
      required: true
  - type: input
    id: links
    attributes:
      label: Links
      placeholder: "#<harm-risk issue>, mitigation PR, soup.yaml update commit"
  - type: checkboxes
    id: soup-yaml
    attributes:
      label: Inventory
      options:
        - label: soup.yaml `anomalies:` updated for this component (or update linked above)
