name: sbom
# Generate a Software Bill of Materials per release (IEC 62304/81001-5-1 evidence;
# CRA Annex I readiness). Uses Syft via anchore/sbom-action — auto-detects the stack
# (npm/maven/gradle/pip/go/…), so the template stays stack-agnostic.
#
# Default format: CycloneDX JSON. For SPDX, change SBOM_FORMAT to spdx-json.
# Runs on published releases (attaches the SBOM as a release asset) and on manual
# dispatch (uploads it as a workflow artifact) — otherwise inert.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # attach the SBOM to the release

env:
  SBOM_FORMAT: cyclonedx-json

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Derive filename extension from SBOM_FORMAT
        id: ext
        run: |
          case "$SBOM_FORMAT" in
            spdx-json) echo "ext=spdx.json" >> "$GITHUB_OUTPUT" ;;
            *)         echo "ext=cdx.json"  >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Generate SBOM
        # SHA-pinned for a reproducible SBOM; Dependabot bumps the SHA + the `# vX` comment
        # (ADR-0003). A ':latest'/'@v0' generator could not be reproducible.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: ${{ env.SBOM_FORMAT }}
          output-file: sbom-${{ github.event.release.tag_name || github.sha }}.${{ steps.ext.outputs.ext }}
          upload-artifact: true
          upload-release-assets: ${{ github.event_name == 'release' }}
