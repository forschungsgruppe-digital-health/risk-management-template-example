# GitLab CI twin of .github/workflows/{sbom,risk-automation}.yml — same
# inert-until-configured contract (docs/GITLAB.md has the full mapping).
#
#  - sbom:             runs only on TAGS (or manual web run) — CycloneDX via Syft,
#                      kept as a job artifact (attach to a release via release-cli
#                      if you use GitLab releases).
#  - vuln-to-register: the Dependabot-bridge equivalent — a SCHEDULED Trivy scan that
#                      opens deduped `risk` + `risk-cat::vulnerability` issues.
#                      INERT until BOTH CI/CD variables exist:
#                        RISK_AUTOMATION_ENABLED=1
#                        RISK_AUTOMATION_TOKEN   (project access token, `api` scope)
#                      plus a pipeline schedule. Detectors feed the register, they
#                      never decide (docs/RISK_MANAGEMENT.md §8).

stages: [report]

sbom:
  stage: report
  image:
    name: anchore/syft:v1.48.0 # pinned for a reproducible SBOM — bump via Renovate (Dependabot doesn't read .gitlab-ci.yml)
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - /syft scan dir:. -o cyclonedx-json=sbom-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}.cdx.json
  artifacts:
    paths:
      - sbom-*.cdx.json
    expire_in: never

register-export:
  # Per-release register snapshot (ISO 14971 §9 evidence) — GitHub twin: register-export.yml.
  # Uses RISK_AUTOMATION_TOKEN if set (api scope, read); without it the job SKIPS itself
  # with a note (CI_JOB_TOKEN cannot list issues) — inert-until-configured.
  stage: report
  image:
    name: alpine:3.21
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - apk add --no-cache jq curl >/dev/null 2>&1
    - |
      [ -n "${RISK_AUTOMATION_TOKEN:-}" ] || { echo "RISK_AUTOMATION_TOKEN not set — register export skipped (set the project access token to enable)."; exit 0; }
      API="$CI_API_V4_URL/projects/$CI_PROJECT_ID"
      for LBL in risk harm-risk; do
        curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" --get "$API/issues" \
          --data-urlencode "labels=$LBL" --data-urlencode "state=all" --data "per_page=100" \
          > "${LBL}-register-${CI_COMMIT_TAG}.json"
        echo "$LBL: $(jq length "${LBL}-register-${CI_COMMIT_TAG}.json") issues"
      done
  artifacts:
    paths:
      - "*-register-*.json"
    expire_in: never

vuln-to-register:
  stage: report
  image:
    name: aquasec/trivy:0.72.0 # pinned for reproducibility — bump via Renovate (Dependabot doesn't read .gitlab-ci.yml)
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RISK_AUTOMATION_ENABLED == "1"
    - if: $CI_PIPELINE_SOURCE == "web" && $RISK_AUTOMATION_ENABLED == "1"
      when: manual
  script:
    - apk add --no-cache jq curl >/dev/null 2>&1 || true
    - trivy fs --scanners vuln --severity HIGH,CRITICAL --format json -o /tmp/trivy.json .
    - |
      [ -n "${RISK_AUTOMATION_TOKEN:-}" ] || { echo "RISK_AUTOMATION_TOKEN not set — reporting only, no issues opened."; jq -r '.Results[]?.Vulnerabilities[]? | "\(.Severity) \(.VulnerabilityID) \(.PkgName)"' /tmp/trivy.json | sort -u; exit 0; }
      API="$CI_API_V4_URL/projects/$CI_PROJECT_ID"
      jq -c '.Results[]?.Vulnerabilities[]? | {id: .VulnerabilityID, sev: .Severity, pkg: .PkgName, title: (.Title // .VulnerabilityID)}' /tmp/trivy.json | sort -u | while read -r v; do
        id=$(echo "$v" | jq -r .id); sev=$(echo "$v" | jq -r .sev); pkg=$(echo "$v" | jq -r .pkg); title=$(echo "$v" | jq -r .title)
        # dedup by LABEL LISTING + client-side match, NOT free-text /search: GitLab basic
        # (PostgreSQL) issue search does no partial matching and mis-tokenizes hyphen/number
        # compounds like CVE-2026-1234 (gitlab#375337), and pkg names carry /:+@ that would
        # need encoding — both silently miss and re-open duplicates. Enumerating the
        # vulnerability-category issues and matching id+pkg in the title is deterministic.
        # (Reads the first 100 vuln issues — ample for a register; paginate if yours exceeds it.)
        exists=$(curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" --get "$API/issues" \
          --data-urlencode "labels=risk-cat::vulnerability" --data-urlencode "state=all" --data "per_page=100" \
          | jq --arg id "$id" --arg pkg "$pkg" '[.[] | select((.title | contains($id)) and (.title | contains($pkg)))] | length')
        if [ "${exists:-0}" != "0" ]; then echo "issue for $id/$pkg exists — skip"; continue; fi
        curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" -X POST "$API/issues" \
          --data-urlencode "title=[RISK] $sev $id in $pkg" \
          --data-urlencode "labels=risk,risk::open,risk-cat::vulnerability" \
          --data-urlencode "description=Automated register entry for a $sev finding: **$title** (\`$pkg\`). Triage per docs/RISK_MANAGEMENT.md (score, owner, decide). If it can affect patient safety, raise a linked harm-risk issue (docs/HARM_RISK.md)." >/dev/null
        echo "opened issue for $id/$pkg"
      done
