# GitLab CI twin of .github/workflows/{sbom,register-export,risk-management-file,pms-review,risk-lint,risk-automation}.yml
# — same inert-until-configured contract (docs/GITLAB.md has the full mapping).
#
#  - sbom:             runs only on TAGS (or manual web run) — CycloneDX via Syft,
#                      kept as a job artifact (attach to a release via release-cli
#                      if you use GitLab releases).
#  - risk-management-file: per-release DELIVERABLE — compiles the scattered
#                      risk-management records into ONE hand-to-auditor document
#                      (ISO 14971 §4.5/§9) via scripts/build-risk-management-file.py +
#                      pandoc; kept as a job artifact (attach to a GitLab release via
#                      release-cli if you use them). GitHub twin: risk-management-file.yml.
#  - vuln-to-register: the Dependabot-bridge equivalent — a SCHEDULED Trivy scan that
#                      opens deduped `risk` + `risk-cat::vulnerability` issues.
#                      INERT until BOTH CI/CD variables exist:
#                        RISK_AUTOMATION_ENABLED=1
#                        RISK_AUTOMATION_TOKEN   (project access token, `api` scope)
#                      plus a pipeline schedule. Detectors feed the register, they
#                      never decide (docs/RISK_MANAGEMENT.md §8).

stages: [report]

sbom:
  stage: report
  image:
    name: anchore/syft:v1.48.0 # pinned for a reproducible SBOM — bump via Renovate (Dependabot doesn't read .gitlab-ci.yml)
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - /syft scan dir:. -o cyclonedx-json=sbom-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}.cdx.json
  artifacts:
    paths:
      - sbom-*.cdx.json
    expire_in: never

register-export:
  # Per-release register snapshot (ISO 14971 §9 evidence) — GitHub twin: register-export.yml.
  # Uses RISK_AUTOMATION_TOKEN if set (api scope, read); without it the job SKIPS itself
  # with a note (CI_JOB_TOKEN cannot list issues) — inert-until-configured.
  stage: report
  image:
    name: alpine:3.21
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - apk add --no-cache jq curl >/dev/null 2>&1
    - |
      [ -n "${RISK_AUTOMATION_TOKEN:-}" ] || { echo "RISK_AUTOMATION_TOKEN not set — register export skipped (set the project access token to enable)."; exit 0; }
      API="$CI_API_V4_URL/projects/$CI_PROJECT_ID"
      # Reads the first 100 issues per label — ample for most registers; if yours exceeds
      # it the job WARNS below (paginate with page=2.. and jq -s 'add' if you need more).
      for LBL in risk harm-risk; do
        curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" --get "$API/issues" \
          --data-urlencode "labels=$LBL" --data-urlencode "state=all" --data "per_page=100" \
          > "${LBL}-register-${CI_COMMIT_TAG}.json" || echo '[]' > "${LBL}-register-${CI_COMMIT_TAG}.json"
        N=$(jq 'if type=="array" then length else 0 end' "${LBL}-register-${CI_COMMIT_TAG}.json")
        echo "$LBL: $N issues"
        [ "$N" -ge 100 ] && echo "WARNING: $LBL export hit the 100-issue page limit — snapshot may be TRUNCATED; paginate to get the full register."
      done
      true
  artifacts:
    paths:
      - "*-register-*.json"
    expire_in: never

risk-management-file:
  # Per-release Risk Management File deliverable (ISO 14971 §4.5/§9) — GitHub twin:
  # risk-management-file.yml. Consumes register-export's JSON artifacts when present
  # (optional); the script degrades gracefully without them. NOTE (parity): register-export
  # self-skips without RISK_AUTOMATION_TOKEN (CI_JOB_TOKEN cannot list issues), so without the
  # token this deliverable ships with a "register not bundled" banner instead of the rendered
  # §5–§7 tables — set the token to embed the registers (the GitHub twin always embeds them via
  # github.token). Produces .md/.docx/.pdf/.html as job artifacts — attach the .pdf/.docx to a
  # GitLab release via release-cli if you use GitLab releases. Asserts no conformity;
  # determinations stay [NEEDS RA INPUT].
  stage: report
  image:
    name: pandoc/latex:3.5 # pandoc + XeLaTeX — bump via Renovate (Dependabot doesn't read .gitlab-ci.yml)
    entrypoint: [""]
  needs:
    - job: register-export
      artifacts: true
      optional: true
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  variables:
    GIT_DEPTH: "0" # full history so `git describe` can resolve the version
  script:
    - apk add --no-cache python3 git >/dev/null 2>&1 || true
    - TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - |
      python3 scripts/build-risk-management-file.py --repo . --tag "$TAG" \
        --register "harm-risk-register-$TAG.json" \
        --delivery-register "risk-register-$TAG.json" \
        --out docs/risk-management-file --formats md,docx,pdf,html
    - ls -la docs/risk-management-file/
  artifacts:
    paths:
      - docs/risk-management-file/*
    expire_in: never

vuln-to-register:
  stage: report
  image:
    name: aquasec/trivy:0.72.0 # pinned for reproducibility — bump via Renovate (Dependabot doesn't read .gitlab-ci.yml)
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RISK_AUTOMATION_ENABLED == "1"
    - if: $CI_PIPELINE_SOURCE == "web" && $RISK_AUTOMATION_ENABLED == "1"
      when: manual
  script:
    - apk add --no-cache jq curl >/dev/null 2>&1 || true
    - trivy fs --scanners vuln --severity HIGH,CRITICAL --format json -o /tmp/trivy.json .
    - |
      [ -n "${RISK_AUTOMATION_TOKEN:-}" ] || { echo "RISK_AUTOMATION_TOKEN not set — reporting only, no issues opened."; jq -r '.Results[]?.Vulnerabilities[]? | "\(.Severity) \(.VulnerabilityID) \(.PkgName)"' /tmp/trivy.json | sort -u; exit 0; }
      API="$CI_API_V4_URL/projects/$CI_PROJECT_ID"
      jq -c '.Results[]?.Vulnerabilities[]? | {id: .VulnerabilityID, sev: .Severity, pkg: .PkgName, title: (.Title // .VulnerabilityID)}' /tmp/trivy.json | sort -u | while read -r v; do
        id=$(echo "$v" | jq -r .id); sev=$(echo "$v" | jq -r .sev); pkg=$(echo "$v" | jq -r .pkg); title=$(echo "$v" | jq -r .title)
        # dedup by LABEL LISTING + client-side match, NOT free-text /search: GitLab basic
        # (PostgreSQL) issue search does no partial matching and mis-tokenizes hyphen/number
        # compounds like CVE-2026-1234 (gitlab#375337), and pkg names carry /:+@ that would
        # need encoding — both silently miss and re-open duplicates. Enumerating the
        # vulnerability-category issues and matching id+pkg in the title is deterministic.
        # (Reads the first 100 vuln issues — ample for a register; paginate if yours exceeds it.)
        exists=$(curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" --get "$API/issues" \
          --data-urlencode "labels=risk-cat::vulnerability" --data-urlencode "state=all" --data "per_page=100" \
          | jq --arg id "$id" --arg pkg "$pkg" '[.[] | select((.title | contains($id)) and (.title | contains($pkg)))] | length')
        if [ "${exists:-0}" != "0" ]; then echo "issue for $id/$pkg exists — skip"; continue; fi
        curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" -X POST "$API/issues" \
          --data-urlencode "title=[RISK] $sev $id in $pkg" \
          --data-urlencode "labels=risk,risk::open,risk-cat::vulnerability" \
          --data-urlencode "description=Automated register entry for a $sev finding: **$title** (\`$pkg\`). Triage per docs/RISK_MANAGEMENT.md (score, owner, decide). If it can affect patient safety, raise a linked harm-risk issue (docs/HARM_RISK.md)." >/dev/null
        echo "opened issue for $id/$pkg"
      done

risk-lint:
  # Advisory drift/consistency lint — GitHub twin: risk-lint.yml. Runs soup-sbom-diff (SOUP↔SBOM,
  # consuming the `sbom` job's artifact when present, else degraded listing). The harm-risk
  # completeness lint (check-harm-risk.sh) is GitHub-gh-based; a GitLab issues-API port is a
  # follow-up (docs/GITLAB.md). WARN-ONLY via allow_failure.
  stage: report
  image:
    name: alpine:3.21
    entrypoint: [""]
  needs:
    - job: sbom
      artifacts: true
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - apk add --no-cache bash jq >/dev/null 2>&1 || true
    - SBOM="$(ls sbom-*.cdx.json 2>/dev/null | head -1 || true)"
    - bash scripts/soup-sbom-diff.sh soup.yaml "${SBOM:-}" || true
    - echo "Note — the harm-risk completeness lint (scripts/check-harm-risk.sh) is GitHub-gh-based; a GitLab issues-API port is a documented follow-up (docs/GITLAB.md)."
  allow_failure: true

pms-review:
  # Post-market surveillance / ISO 14971 §10 periodic review — GitHub twin: pms-review.yml.
  # Opens a GitLab issue with the §10.2–§10.4 checklist. INERT until a pipeline SCHEDULE exists,
  # PMS_REVIEW_ENABLED=1, and RISK_AUTOMATION_TOKEN (api scope) is set. Manual web run also works.
  stage: report
  image:
    name: alpine:3.21
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $PMS_REVIEW_ENABLED == "1"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - apk add --no-cache curl >/dev/null 2>&1 || true
    - |
      [ -n "${RISK_AUTOMATION_TOKEN:-}" ] || { echo "RISK_AUTOMATION_TOKEN not set — PMS review issue not opened (set the project access token to enable)."; exit 0; }
      API="$CI_API_V4_URL/projects/$CI_PROJECT_ID"
      DATE="$(date -u +%Y-%m-%d)"
      DESC="Periodic post-market surveillance / ISO 14971 §10 review (method: docs/PMS.md).

      ### §10.2 Collect (since last review)
      - [ ] New field-feedback issues (incidents / user-reported problems)
      - [ ] New SOUP anomalies + vulnerability→register issues (SBOM / CVE feed)
      - [ ] Publicly available info; CONFORMANCE.md watch rows (state of the art / regulatory drift)

      ### §10.3 Review (safety relevance)
      - [ ] Previously unrecognised hazard? Risk no longer acceptable? Overall residual still acceptable?
      - [ ] Trend signal across incidents/complaints (MDR Art. 88)?

      ### §10.4 Act
      - [ ] Update the harm-risk register / raise new harm-risk issues
      - [ ] Feed material changes into top-management process review (§4.2)
      - [ ] At a release: roll the outcome into HARM_RISK_REPORT.md (§9)

      Outcome: _<what was reviewed, what changed, actions taken or none-needed>_"
      curl -sf --header "PRIVATE-TOKEN: $RISK_AUTOMATION_TOKEN" -X POST "$API/issues" \
        --data-urlencode "title=[PMS] Post-market surveillance review — $DATE" \
        --data-urlencode "labels=pms-review" \
        --data-urlencode "description=$DESC" >/dev/null && echo "opened PMS review issue for $DATE"
